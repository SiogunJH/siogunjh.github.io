- id: voice-intent-system
  title: Voice Intent Analysis and Matching System
  type: Technical Case Study
  status: Implemented
  role: System Designer and Programmer
  team_size: 1
  period: 2026
  summary: Unity C# architecture that converts raw speech recognition output into gameplay commands using token and fuzzy matching.
  highlights:
    - Built IntentTokenMatcher with required, optional, and forbidden token logic.
    - Built IntentFuzzyMatcher with Levenshtein similarity and configurable confidence threshold.
    - Combined matcher outputs to select best intent for gameplay command execution.
  tech_stack:
    - Unity
    - C#
    - Vosk4Unity
    - NLP
  platforms:
