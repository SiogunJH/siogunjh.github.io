<article class="card gist-card">
  <header class="card-header">
    <h3>{% if gist.gist_url %}<a href="{{ gist.gist_url }}" target="_blank" rel="noopener noreferrer">{{ gist.title }}</a>{% else %}{{ gist.title }}{% endif %}</h3>
    <div class="gist-header-meta">
      <span class="badge">{{ gist.language }}</span>
      {% if gist.tags and gist.tags.size > 0 %}
      {% for tag in gist.tags %}
      <span class="chip">{{ tag }}</span>
      {% endfor %}
      {% endif %}
    </div>
  </header>
  <p>{{ gist.description }}</p>
  {% if gist.embed_script_url %}
  <details class="gist-toggle">
    <summary>Preview</summary>
    <div class="gist-preview" aria-label="Embedded gist preview">
      <script src="{{ gist.embed_script_url }}"></script>
    </div>
  </details>
  {% endif %}
</article>
